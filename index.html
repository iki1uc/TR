<script>
// VISIT‑Tech‑Loader

window.VISIT = {

    path: "VISIT/",

    nodes: [
        "HH.room",
        "verify.html",
        "RESPO.json",
        "9x9-Matrix",
        "VEC.js",
        "start.vector"
    ],

    tech: {
        active: true,
        mode: "visitor-tech",
        bind: "HH→TR",
        ghost: "sync",
        evo: "run",
        pipeline: "soft-bind"
    },

    loadNode(name) {
        return {
            file: name,
            location: this.path + name,
            status: "VISIT‑NODE",
            techMode: this.tech.mode,
            ghostSync: this.tech.ghost,
            evoRun: this.tech.evo,
            pipeline: this.tech.pipeline
        };
    },

    scan() {
        return this.nodes.map(n => this.loadNode(n));
    }
};
</script>

<div id="visitPanel"></div>

<script>
// VISIT‑Scan anzeigen

const visit = VISIT.scan();

document.getElementById("visitPanel").innerHTML =
    visit.map(v => `
        <div style="color:#0ff; margin-bottom:10px;">
            <b>${v.file}</b><br>
            Pfad: ${v.location}<br>
            Status: ${v.status}<br>
            Tech‑Modus: ${v.techMode}<br>
            Ghost‑Sync: ${v.ghostSync}<br>
            EVO‑RUN: ${v.evoRun}<br>
            Pipeline: ${v.pipeline}
        </div>
    `).join("");
</script>
