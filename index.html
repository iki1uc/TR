<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TR Event Horizon</title>
<style>
  body {
    margin: 0;
    background: #001f2f;
    overflow: hidden;
  }

  #horizon {
    position: absolute;
    width: 100vw;
    height: 100vh;
    background: radial-gradient(circle, #00bcd4 0%, #003f5f 60%, #001f2f 100%);
    filter: blur(2px);
  }

  #flag {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 300px;
    height: 180px;
    background: linear-gradient(135deg, #00bcd4, #ffffff);
    opacity: 0;
    border-radius: 8px;
    box-shadow: 0 0 40px rgba(0,188,212,0.6);
  }

  #reflection {
    position: absolute;
    top: 55%;
    left: 50%;
    transform: translate(-50%, -50%) scaleY(-1);
    width: 300px;
    height: 180px;
    background: linear-gradient(135deg, #00bcd4, #ffffff);
    opacity: 0.3;
    filter: blur(4px);
    border-radius: 8px;
  }

  canvas {
    position: absolute;
    top: 0;
    left: 0;
  }
</style>
</head>
<body>

<div id="horizon"></div>
<div id="flag"></div>
<div id="reflection"></div>
<canvas id="ripple"></canvas>

<script>
const canvas = document.getElementById("ripple");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let ripples = [];

function addRipple(x, y) {
  ripples.push({ x, y, radius: 0, alpha: 1 });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ripples.forEach(r => {
    ctx.beginPath();
    ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(0,188,212,${r.alpha})`;
    ctx.lineWidth = 3;
    ctx.stroke();
    r.radius += 2;
    r.alpha -= 0.01;
  });

  ripples = ripples.filter(r => r.alpha > 0);

  requestAnimationFrame(animate);
}

animate();

// Morphont‑Rise
setTimeout(() => {
  document.getElementById("flag").style.transition = "opacity 3s ease-out";
  document.getElementById("flag").style.opacity = 1;
}, 2000);

// Tropfen → Ripple
setInterval(() => {
  addRipple(window.innerWidth / 2, window.innerHeight / 2 + 100);
}, 1500);
</script>

</body>
</html>
